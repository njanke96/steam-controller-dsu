[workspace]
members = ["crates/core", "crates/cli"]
resolver = "3"

[workspace.dependencies]
clap = { version = "4", features = ["derive"] }
env_logger = "0.11"
hidapi = "2.6"
libc = "0.2"
log = "0.4"

[package]
name = "steam-controller-dsu"
version = "0.1.0"
edition = "2024"

[dependencies]
scdsu-cli = { path = "crates/cli" }

[[bin]]
name = "steam-controller-dsu"
path = "crates/cli/src/main.rs"
